<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Meghan Kulkarni · Portfolio Agent</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Syne:wght@400;600;700;800&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #030e14;
  --glass:   rgba(5,18,28,.7);
  --gb:      rgba(100,200,220,.1);
  --primary: #0ea5b5;
  --plight:  #5cc8d5;
  --teal:    #0ea5b5;
  --gold:    #5cc8d5;
  --text:    #c8dde6;
  --muted:   #4a6878;
}
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; overflow-x: hidden; }
body {
  background: var(--bg);
  background-image: radial-gradient(ellipse 70% 40% at 30% 0%, rgba(14,165,181,.06), transparent 60%),
    radial-gradient(ellipse 50% 30% at 80% 100%, rgba(0,140,160,.04), transparent 55%);
  color: var(--text);
  font-family: 'Roboto', system-ui, sans-serif;
  font-size: 14px;
  line-height: 1.6;
  display: flex;
  flex-direction: column;
}
a { color: inherit; text-decoration: none; }

/* ── UNDERWATER AMBIENCE ── */
.uw{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
/* caustic light shimmer */
.uw::before{content:'';position:absolute;inset:0;background:
  radial-gradient(ellipse 60% 30% at 30% 5%, rgba(14,165,181,.07), transparent 60%),
  radial-gradient(ellipse 40% 20% at 70% 10%, rgba(92,200,213,.05), transparent 55%);
  animation:caustic 18s ease-in-out infinite alternate}
.uw::after{content:'';position:absolute;inset:0;background:
  radial-gradient(ellipse 50% 25% at 55% 8%, rgba(14,165,181,.05), transparent 55%);
  animation:caustic 24s ease-in-out infinite alternate-reverse}
@keyframes caustic{0%{opacity:.6;transform:translateX(-15px) scaleX(.95)}100%{opacity:1;transform:translateX(15px) scaleX(1.05)}}
.b{position:absolute;border-radius:50%;background:rgba(100,200,220,.04);border:1px solid rgba(100,200,220,.07);animation:rise linear infinite}
@keyframes rise{0%{transform:translateY(0) translateX(0);opacity:0}10%{opacity:1}90%{opacity:.5}100%{transform:translateY(-110vh) translateX(12px);opacity:0}}

/* ── HEADER ── */
header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 20;
  height: 56px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px;
  background: rgba(3,10,18,.9);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-bottom: 1px solid rgba(100,200,220,.1);
  box-shadow: 0 1px 0 rgba(255,255,255,.04), 0 4px 24px rgba(0,0,0,.3);
}
.h-logo { font-family: 'Roboto', system-ui, sans-serif; font-weight: 700; font-size: 15px; letter-spacing: -.01em; }
.h-logo span { color: var(--primary); text-shadow: 0 0 12px rgba(14,165,181,.4); }
.h-status { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--muted); }
.h-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--teal); animation: pulse 2s infinite; box-shadow: 0 0 6px var(--teal); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }
.h-nav { display: flex; gap: 16px; align-items: center; }
.h-nav a { font-size: 13px; color: var(--muted); transition: color .2s; }
.h-nav a:hover { color: var(--text); }
.h-nav .h-cta { padding: 6px 16px; border-radius: 100px; border: 1px solid var(--gb); font-size: 12px; transition: border-color .2s; }
.h-nav .h-cta:hover { border-color: var(--primary); color: var(--plight); }
.h-cs-btn { background: rgba(100,200,220,.1); border: 1px solid rgba(100,200,220,.25); color: var(--plight); font-size: 12px; font-weight: 500; padding: 5px 13px; border-radius: 100px; cursor: pointer; font-family: inherit; transition: all .2s; }
.h-cs-btn:hover { background: rgba(100,200,220,.2); border-color: var(--primary); }
.h-nav-btn { background: none; border: none; color: var(--muted); font-size: 13px; font-weight: 400; padding: 0; cursor: pointer; font-family: inherit; transition: color .2s; }
.h-nav-btn:hover { color: var(--text); }

/* ── CHAT AREA ── */
#chatWrap {
  flex: 1;
  overflow-y: auto;
  padding: 76px 24px 210px;
  position: relative; z-index: 1;
}
#chatWrap::-webkit-scrollbar { width: 3px; }
#chatWrap::-webkit-scrollbar-thumb { background: rgba(100,200,220,.2); border-radius: 2px; }

.msgs { max-width: 950px; margin: 0 auto; display: flex; flex-direction: column; gap: 12px; }

/* ── MESSAGES ── */
.msg { display: flex; gap: 10px; }
.msg.user { flex-direction: row-reverse; }

.msg-av {
  width: 36px; height: 36px; border-radius: 50%;
  background: radial-gradient(circle at 40% 35%, rgba(100,200,220,.35), rgba(5,60,80,.8));
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 600; flex-shrink: 0; margin-top: 2px;
  box-shadow: 0 0 14px rgba(14,165,181,.25), inset 0 1px 0 rgba(255,255,255,.15);
  border: 1px solid rgba(100,200,220,.25);
  color: #aee8f0; overflow: hidden;
}
.msg-av img { width: 100%; height: 100%; object-fit: cover; object-position: center top; border-radius: 50%; display: block; image-rendering: -webkit-optimize-contrast; }
.msg-av-user { background: rgba(14,165,181,.15); border-color: rgba(14,165,181,.3); color: #5cc8d5; }
.bub {
  padding: 11px 15px;
  border-radius: 14px;
  max-width: 950px;
  line-height: 1.68;
  font-size: 13.5px;
}
.msg.agent .bub {
  background: linear-gradient(160deg, rgba(5,22,35,.82), rgba(3,14,22,.88));
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(100,200,220,.12);
  border-top-color: rgba(100,200,220,.2);
  border-radius: 4px 16px 16px 16px;
  box-shadow: 0 4px 20px rgba(0,0,0,.25), inset 0 1px 0 rgba(100,200,220,.08);
}
.msg.user .bub {
  background: linear-gradient(135deg, rgba(14,165,181,.9), rgba(5,90,108,.95));
  color: #e0f7fa;
  border-radius: 16px 4px 16px 16px;
  box-shadow: 0 4px 16px rgba(14,165,181,.2);
  border: 1px solid rgba(100,200,220,.2);
}
.msg.agent .bub strong { color: #7dd8e2; font-weight: 600; }
.msg.agent .bub em { color: #7dd8e2; font-style: italic; }
.msg.agent .bub strong { color: var(--plight); font-weight: 600; }
.msg.agent .bub em { color: var(--plight); font-style: italic; }

/* typing */
.typing { display: flex; gap: 4px; padding: 2px 0; }
.typing span { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); animation: bounce .8s infinite; }
.typing span:nth-child(2){animation-delay:.15s} .typing span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-7px)}}

/* ── RICH CARDS ── */
.msg.agent .msg-card-wrap { max-width: 950px; }

.msg-card {
  background: rgba(10,10,18,.85);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border: 1px solid rgba(100,200,220,.15);
  border-radius: 16px;
  overflow: hidden;
  width: 100%;
  box-shadow: 0 8px 32px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.05);
  transition: border-color .25s, transform .25s, box-shadow .25s;
}
.msg-card:hover { border-color: rgba(100,200,220,.3); transform: translateY(-2px); box-shadow: 0 16px 48px rgba(14,165,181,.1), 0 8px 32px rgba(0,0,0,.4); }
.mc-vis { height: 130px; position: relative; overflow: hidden; flex-shrink: 0; }
.mc-vis-1 { background: linear-gradient(135deg,#020c14 0%,#051c28 50%,#041823 100%); }
.mc-vis-2 { background: linear-gradient(135deg,#020c14 0%,#051c28 50%,#041823 100%); }
.mc-vis-1::after { content:''; position:absolute; inset:0; background: radial-gradient(ellipse 80% 80% at 60% 50%,rgba(14,165,181,.1),transparent 65%); }
.mc-vis-2::after { content:''; position:absolute; inset:0; background: radial-gradient(ellipse 80% 80% at 40% 50%,rgba(14,165,181,.1),transparent 65%); }
.mc-vis-grid {
  position: absolute; inset: 0;
  background-image: linear-gradient(rgba(14,165,181,.06) 1px,transparent 1px),
    linear-gradient(90deg,rgba(14,165,181,.06) 1px,transparent 1px);
  background-size: 22px 22px;
  z-index: 1;
}
.mc-body { padding: 14px; }
.mc-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 8px; }
.mc-tag { padding: 2px 8px; border-radius: 100px; font-size: 11px; font-weight: 500; border: 1px solid rgba(100,200,220,.18); color: var(--muted); }
.mc-title { font-family: 'Roboto', system-ui, sans-serif; font-size: 15px; font-weight: 700; letter-spacing: -.01em; margin-bottom: 3px; }
.mc-sub { font-size: 12px; color: var(--muted); margin-bottom: 10px; }
.mc-metrics { display: flex; gap: 14px; padding: 10px 0; border-top: 1px solid rgba(100,200,220,.1); border-bottom: 1px solid rgba(100,200,220,.1); margin-bottom: 10px; }
.mc-mv { font-size: 16px; font-weight: 700; letter-spacing: -.015em; }
.mc-ml { font-size: 11px; color: var(--muted); margin-top: 1px; }
.mc-cta { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 500; color: var(--plight); cursor: pointer; background: none; border: none; font-family: inherit; padding: 0; transition: gap .2s; }
.mc-cta:hover { gap: 10px; }

/* skills */
.skill-card {
  background: rgba(9,18,31,.75);
  backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
  border: 1px solid var(--gb);
  border-radius: 14px; padding: 16px;
  max-width: 950px;
}
.sk-head { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: .12em; color: var(--muted); margin-bottom: 12px; }
.sk-row { display: flex; align-items: center; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid rgba(100,200,220,.08); font-size: 13px; }
.sk-row:last-child { border-bottom: none; }
.sk-bar { width: 72px; height: 3px; background: rgba(100,200,220,.15); border-radius: 2px; overflow: hidden; }
.sk-fill { height: 100%; background: var(--primary); border-radius: 2px; }

/* outcomes */
.out-card {
  background: rgba(9,18,31,.75);
  backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
  border: 1px solid var(--gb);
  border-radius: 14px; padding: 16px;
  max-width: 950px;
}
.out-label { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: .12em; color: var(--muted); margin-bottom: 12px; }
.out-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
.out-item { background: rgba(14,165,181,.05); border: 1px solid rgba(14,165,181,.1); border-radius: 10px; padding: 12px; }
.out-val { font-size: 22px; font-weight: 700; letter-spacing: -.025em; }
.out-desc { font-size: 11px; color: var(--muted); margin-top: 4px; line-height: 1.4; }

/* contact */
.contact-card {
  background: rgba(9,18,31,.75);
  backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
  border: 1px solid var(--gb);
  border-radius: 14px; padding: 18px;
  max-width: 950px;
}
.cc-head { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; padding-bottom: 14px; border-bottom: 1px solid rgba(100,200,220,.1); }
.cc-av { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg,var(--primary),#065a68); display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 600; flex-shrink: 0; }
.cc-name { font-size: 15px; font-weight: 600; }
.cc-role { font-size: 12px; color: var(--muted); margin-top: 2px; }
.cc-links { display: flex; flex-direction: column; gap: 7px; }
.cc-link { display: flex; align-items: center; gap: 10px; font-size: 13px; padding: 9px 12px; background: rgba(100,200,220,.07); border: 1px solid rgba(100,200,220,.14); border-radius: 8px; transition: background .2s; color: var(--text); text-decoration: none; }
.cc-link:hover { background: rgba(100,200,220,.14); }

/* ── SECTION TAG ── */
.section-tag-row { display: flex; align-items: center; gap: 10px; max-width: 950px; margin: 4px 0 2px; }
.section-tag { display: inline-flex; align-items: center; gap: 6px; padding: 4px 11px; background: rgba(14,165,181,.08); border: 1px solid rgba(14,165,181,.22); border-radius: 100px; font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: .13em; text-transform: uppercase; color: var(--primary); white-space: nowrap; }
.section-tag-line { flex: 1; height: 1px; background: rgba(100,200,220,.1); }

/* ── LIST CARD ── */
.list-card { background: linear-gradient(160deg,rgba(5,22,35,.9),rgba(3,14,22,.92)); backdrop-filter: blur(20px); border: 1px solid rgba(100,200,220,.15); border-top-color: rgba(100,200,220,.25); border-radius: 14px; padding: 16px 18px; max-width: 950px; }
.list-card-title { font-size: 11px; font-family: 'IBM Plex Mono', monospace; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
.list-items { display: flex; flex-direction: column; gap: 8px; }
.list-item { display: flex; align-items: flex-start; gap: 10px; font-size: 13px; line-height: 1.55; }
.list-item::before { content: '—'; color: var(--primary); font-family: 'IBM Plex Mono', monospace; font-size: 11px; margin-top: 2px; flex-shrink: 0; }

/* quote */
.quote-card {
  border-left: 3px solid var(--primary);
  padding: 12px 16px;
  background: rgba(9,18,31,.55);
  backdrop-filter: blur(8px);
  border-radius: 0 10px 10px 0;
  font-style: italic; font-size: 14px; line-height: 1.7;
  color: var(--text);
  max-width: 950px;
}
.quote-attr { font-size: 12px; color: var(--muted); margin-top: 6px; font-style: normal; }

/* ── metric graph card ── */
.metric-card {
  background: linear-gradient(160deg, rgba(5,22,35,.9), rgba(3,14,22,.92));
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(100,200,220,.15);
  border-top-color: rgba(100,200,220,.25);
  border-radius: 14px; padding: 18px;
  max-width: 950px;
  box-shadow: 0 8px 32px rgba(0,0,0,.3), inset 0 1px 0 rgba(100,200,220,.08);
}
.mc-g-label { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: .12em; color: var(--muted); margin-bottom: 14px; }
.mc-g-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.mc-g-row:last-child { margin-bottom: 0; }
.mc-g-name { font-size: 12px; color: var(--text); width: 160px; flex-shrink: 0; line-height: 1.4; }
.mc-g-track { flex: 1; height: 6px; background: rgba(100,200,220,.08); border-radius: 3px; overflow: hidden; }
.mc-g-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, #0ea5b5, #5cc8d5); animation: barGrow .9s ease forwards; transform-origin: left; }
@keyframes barGrow { from { transform: scaleX(0); } to { transform: scaleX(1); } }
.mc-g-val { font-size: 12px; font-weight: 600; color: #7dd8e2; width: 48px; text-align: right; flex-shrink: 0; }
.mc-g-divider { border: none; border-top: 1px solid rgba(100,200,220,.08); margin: 14px 0; }
.mc-big-stat { display: flex; gap: 12px; flex-wrap: wrap; }
.mc-big-item { flex: 1; min-width: 100px; background: rgba(14,165,181,.06); border: 1px solid rgba(100,200,220,.1); border-radius: 10px; padding: 12px; }
.mc-big-val { font-size: 22px; font-weight: 700; letter-spacing: -.03em; color: #5cc8d5; }
.mc-big-desc { font-size: 11px; color: var(--muted); margin-top: 4px; line-height: 1.4; }

/* prototype embed */
.proto-embed-wrap { position: relative; width: 100%; height: 520px; background: rgba(3,14,22,.6); border-radius: 0 0 8px 8px; overflow: hidden; }
.proto-iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; display: block; }

/* ── HERO BAND ── */
.hero-band { max-width: 950px; margin: 0 auto; padding: 56px 0 44px; text-align: center; border-bottom: 1px solid rgba(100,200,220,.08); margin-bottom: 32px; }
.hb-eyebrow { font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: .18em; text-transform: uppercase; color: var(--primary); font-weight: 400; margin-bottom: 16px; opacity: .9; }
.hb-h1 { font-family: 'Roboto', system-ui, sans-serif; font-weight: 700; font-size: clamp(26px,3.5vw,44px); line-height: 1.1; letter-spacing: -.02em; margin-bottom: 14px; }
.hb-h1 em { font-style: normal; color: var(--primary); font-weight: 800; }
.hb-sub { font-size: clamp(17px, 2.2vw, 26px); color: var(--text); font-weight: 400; line-height: 1.4; max-width: 640px; margin: 0 auto 30px; letter-spacing: -.01em; }
.hb-sub em { font-style: italic; color: var(--text); }
.hb-stats { display: flex; justify-content: center; gap: 44px; margin-bottom: 36px; }
.hb-stat-n { font-size: 20px; font-weight: 600; color: var(--plight); letter-spacing: -.02em; }
.hb-stat-l { font-size: 11px; color: var(--muted); margin-top: 3px; }
.hb-divider { display: flex; align-items: center; gap: 12px; }
.hb-divider::before, .hb-divider::after { content: ''; flex: 1; height: 1px; background: rgba(100,200,220,.1); }
.hb-divider-label { font-size: 11px; color: var(--muted); letter-spacing: .1em; text-transform: uppercase; white-space: nowrap; }

/* image slots */
.cs-img-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
.cs-img-slot { border-radius: 8px; overflow: hidden; border: 1px solid rgba(100,200,220,.1); background: rgba(14,165,181,.04); aspect-ratio: 16/10; position: relative; }
.cs-img-slot img { width: 100%; height: 100%; object-fit: cover; display: block; }
.cs-img-ph { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 11px; color: rgba(100,200,220,.3); letter-spacing: .06em; }
.cs-img-slot[data-label]::after { content: attr(data-label); position: absolute; bottom: 0; left: 0; right: 0; padding: 4px 8px; font-size: 10px; color: var(--muted); background: rgba(3,14,22,.75); }
.proto-link { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 500; color: var(--plight); padding: 7px 14px; border: 1px solid rgba(100,200,220,.2); border-radius: 8px; transition: all .2s; text-decoration: none; }
.proto-link:hover { background: rgba(14,165,181,.1); border-color: var(--primary); }

/* process */
.process-card {
  background: rgba(9,18,31,.75);
  backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
  border: 1px solid var(--gb);
  border-radius: 14px; padding: 16px;
  max-width: 950px;
}
.pc-label { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: .12em; color: var(--muted); margin-bottom: 10px; }
.pc-step { display: flex; gap: 12px; padding: 9px 0; border-bottom: 1px solid rgba(100,200,220,.08); }
.pc-step:last-child { border-bottom: none; }
.pc-num { width: 26px; height: 26px; border-radius: 50%; background: rgba(14,165,181,.1); border: 1px solid rgba(14,165,181,.22); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: var(--plight); flex-shrink: 0; margin-top: 1px; }
.pc-title { font-size: 13px; font-weight: 500; margin-bottom: 2px; }
.pc-desc { font-size: 12px; color: var(--muted); line-height: 1.55; }

/* experience */
.exp-card {
  background: rgba(9,18,31,.75);
  backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
  border: 1px solid var(--gb);
  border-radius: 14px; padding: 16px;
  max-width: 950px;
}
.exp-item { padding: 10px 0; border-bottom: 1px solid rgba(100,200,220,.08); }
.exp-item:last-child { border-bottom: none; }
.exp-company { font-size: 13px; font-weight: 600; color: var(--plight); }
.exp-role { font-size: 13px; font-weight: 500; margin-top: 2px; }
.exp-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
.exp-detail { font-size: 12px; color: var(--muted); margin-top: 5px; line-height: 1.5; }

/* ── BOTTOM INPUT ── */
#inputArea {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 20;
  background: rgba(3,10,18,.9);
  backdrop-filter: blur(28px);
  -webkit-backdrop-filter: blur(28px);
  border-top: 1px solid rgba(100,200,220,.1);
  box-shadow: 0 -1px 0 rgba(255,255,255,.04);
  padding: 10px 24px 20px;
}
.ia-inner { max-width: 950px; margin: 0 auto; }
#chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; min-height: 28px; }
.chip {
  padding: 5px 13px;
  border: 1px solid rgba(100,200,220,.18);
  border-radius: 100px;
  font-size: 12px; cursor: pointer;
  background: rgba(100,200,220,.06);
  color: var(--muted); font-family: inherit;
  transition: all .2s; backdrop-filter: blur(6px);
}
.chip:hover { border-color: var(--primary); color: var(--plight); background: rgba(100,200,220,.14); transform: translateY(-1px); }
.ia-row { display: flex; gap: 10px; align-items: center; }
.ia-input {
  flex: 1;
  background: rgba(255,255,255,.05);
  border: 1px solid rgba(100,200,220,.18);
  border-radius: 100px;
  padding: 11px 18px;

// ── queue helper ─────────────────────────────────────────────────────────────

let _qids = [];
function cancelQ() { _qids.forEach(id => clearTimeout(id)); _qids = []; }
function q(actions) {
  cancelQ();
  let t = 0;
  actions.forEach(([ms, fn]) => { t += ms; _qids.push(setTimeout(fn, t)); });
}

// Animate dots in cs1 card visual
function animateDots(id) {
  const c = document.getElementById(id);
  if (!c) return;
  ['rgba(14,165,181,.55)','rgba(92,200,213,.5)','rgba(14,165,181,.35)'].forEach(col => {
    for (let i = 0; i < 5; i++) {
      const d = document.createElement('span');
      const sz = 4 + Math.random()*10;
      d.style.cssText = `width:${sz}px;height:${sz}px;position:absolute;border-radius:50%;left:${5+Math.random()*90}%;top:${10+Math.random()*80}%;background:${col};animation:bounce ${2+Math.random()*2}s ease-in-out ${Math.random()*3}s infinite`;
      c.appendChild(d);
    }
  });
}

        addCard(tplSectionTag('07 · User Testing'));

// ── intent routing ────────────────────────────────────────────────────────────

const intents = [
  { k:['about me','about meghan','who is','tell me about','bio','introduce','yourself','background meghan'], fn: R.about },
  { k:['show me your work','show me her work','case studi','portfolio','projects','see your work','see her work'], fn: R.work },
  { k:['knowledge engine','internal knowledge','itsm','accrete ai product'],              fn: R.cs1 },
  { k:['cassini','design system','foundation first'],                                     fn: R.cs2 },
  { k:['skill','tool','figma','framer','speciali','good at','expert','best at','what do you do','what does she do'], fn: R.skills },
  { k:['process','how does she work','methodolog','approach','how do you','your process'], fn: R.process },
  { k:['experience','where has she','previous','avesha','keurig','worked','history','your experience'], fn: R.experience },
  { k:['contact','reach','email','phone','how do i','hire','get in touch','reach you'],   fn: R.contact },
  { k:['available','open to','open roles','hiring','looking'],                            fn: R.availability },
  { k:['ai','artificial','agent','machine learning','intelligence','llm'],                fn: R.ai },
  { k:['scuba','personal','outside','hobby','fun fact','diving','interest'],              fn: R.personal },
];

function processInput(text) {
  const l = text.toLowerCase().trim();
  for (const intent of intents) {
    if (intent.k.some(k => l.includes(k))) { intent.fn(); return; }
  }
  R.fallback();
}

// ── send ──────────────────────────────────────────────────────────────────────

function send(text) {
  const v = (text || inputEl.value).trim();
  if (!v) return;
  inputEl.value = '';
  addBubble(v, 'user');
  processInput(v);
}

inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') send(); });
document.getElementById('sendBtn').addEventListener('click', () => send());
document.getElementById('resetBtn').addEventListener('click', () => {
  msgsEl.innerHTML = '';
  chipsEl.innerHTML = '';
  document.getElementById('chatWrap').scrollTop = 0;
  setTimeout(() => R.greeting(), 300);
});

setTimeout(() => R.greeting(), 600);
